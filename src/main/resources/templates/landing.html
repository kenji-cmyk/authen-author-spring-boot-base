<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Successful - Mastercard Style</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="nav-pill">
        <div style="font-weight: 700; font-size: 20px; color: var(--signal-orange);">Mastercard</div>
        <div style="display: flex; gap: 16px; align-items: center;">
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-secondary" style="padding: 6px 16px; font-size: 14px; border-radius: 999px;">Logout</button>
            </form>
        </div>
    </nav>

    <div class="page-center">
        <div class="form-container" style="text-align: center;">
            <div style="width: 80px; height: 80px; background-color: #28a745; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            
            <div class="eyebrow" style="justify-content: center;">Success</div>
            <h2>Welcome back, <span sec:authentication="name">User</span>!</h2>
            <p style="color: var(--slate-gray); margin-bottom: 32px; margin-top: 8px;">You have successfully signed in to your priceless account.</p>

            <div style="background-color: var(--canvas-cream); padding: 24px; border-radius: var(--radius-button); margin-bottom: 32px; text-align: left;">
                <p style="font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--slate-gray);">ACCOUNT DETAILS</p>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 14px;">Status</span>
                    <span style="font-size: 14px; font-weight: 700; color: #28a745;">Authenticated</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-size: 14px;">Security</span>
                    <span style="font-size: 14px; font-weight: 700;">JWT Protected</span>
                </div>
            </div>

            <a href="/" class="btn btn-primary" style="width: 100%;">Go to Dashboard</a>
        </div>
    </div>
</body>
</html>
